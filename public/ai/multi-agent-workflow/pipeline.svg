<svg viewBox="0 0 1180 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
    <style>
      .box   { fill:#ffffff; stroke:#c3ced9; stroke-width:1.5; }
      .orch  { fill:#eef4ff; stroke:#7aa7ff; stroke-width:1.5; }
      .title { fill:#1f2d3d; font-size:14px; font-weight:700; }
      .sub   { fill:#6b7886; font-size:11.5px; }
      .tlabel{ fill:#8a97a5; font-size:13px; font-weight:700; letter-spacing:1px; }
      .gate  { fill:#C15F3C; }
      .gatetx{ fill:#ffffff; font-size:11px; font-weight:700; }
      .gatesub{ fill:#C15F3C; font-size:11px; font-weight:700; }
      .flow  { stroke:#5b6b7b; stroke-width:1.6; fill:none; marker-end:url(#arrow); }
      .spawn { stroke:#9bb6d8; stroke-width:1.4; fill:none; stroke-dasharray:5 4; marker-end:url(#arrow); }
      .note  { fill:#9aa6b2; font-size:11px; font-style:italic; }
    </style>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="800" fill="#1f2d3d">Multi-Agent Workflow — supervised autonomous pipeline</text>
  <text x="40" y="64" font-size="13" fill="#6b7886">You give a goal; an orchestrator decomposes it, schedules specialist agents, and stops at three fixed human gates.</text>

  <!-- Orchestrator supervisor bar -->
  <rect class="orch" x="40" y="88" width="1100" height="62" rx="12"/>
  <text class="tlabel" x="62" y="116">ORCHESTRATOR</text>
  <text class="sub" x="62" y="137">Claude Code / Codex · decompose + schedule</text>
  <text class="sub" x="1118" y="114" text-anchor="end">maintains spec.md — single source of truth</text>
  <text class="sub" x="1118" y="134" text-anchor="end">injects context on every cold-start handoff</text>

  <!-- spawn arrows down to the three specialist stages -->
  <path class="spawn" d="M247 150 V246"/>
  <path class="spawn" d="M499 150 V246"/>
  <path class="spawn" d="M796 150 V246"/>
  <text class="note" x="812" y="172">spawns specialist agents</text>

  <!-- Pipeline row (boxes h78, y 246–324, center y285) -->
  <rect class="box" x="40"  y="246" width="118" height="78" rx="10"/>
  <text class="title" x="99"  y="282" text-anchor="middle">You</text>
  <text class="sub"   x="99"  y="302" text-anchor="middle">a goal</text>

  <rect class="box" x="172" y="246" width="150" height="78" rx="10"/>
  <text class="title" x="247" y="282" text-anchor="middle">prd-writer</text>
  <text class="sub"   x="247" y="302" text-anchor="middle">PRD draft</text>

  <rect class="gate" x="336" y="268" width="74" height="34" rx="17"/>
  <text class="gatetx"  x="373" y="289" text-anchor="middle">GATE 1</text>
  <text class="gatesub" x="373" y="342" text-anchor="middle">confirm PRD</text>

  <rect class="box" x="424" y="246" width="150" height="78" rx="10"/>
  <text class="title" x="499" y="282" text-anchor="middle">designer</text>
  <text class="sub"   x="499" y="302" text-anchor="middle">layout / states</text>

  <rect class="gate" x="588" y="268" width="74" height="34" rx="17"/>
  <text class="gatetx"  x="625" y="289" text-anchor="middle">GATE 2</text>
  <text class="gatesub" x="625" y="342" text-anchor="middle">skim design</text>

  <rect class="box" x="676" y="246" width="240" height="78" rx="10"/>
  <text class="title" x="796" y="282" text-anchor="middle">coder ‖ reviewer ‖ tester</text>
  <text class="sub"   x="796" y="302" text-anchor="middle">implement / review / test loop</text>

  <rect class="gate" x="930" y="268" width="74" height="34" rx="17"/>
  <text class="gatetx"  x="967" y="289" text-anchor="middle">GATE 3</text>
  <text class="gatesub" x="967" y="342" text-anchor="middle">real-device</text>

  <rect class="box" x="1018" y="246" width="118" height="78" rx="10"/>
  <text class="title" x="1077" y="282" text-anchor="middle">Shipped</text>
  <text class="sub"   x="1077" y="302" text-anchor="middle">accepted code</text>

  <!-- horizontal flow -->
  <path class="flow" d="M158 285 H172"/>
  <path class="flow" d="M322 285 H336"/>
  <path class="flow" d="M410 285 H424"/>
  <path class="flow" d="M574 285 H588"/>
  <path class="flow" d="M662 285 H676"/>
  <path class="flow" d="M916 285 H930"/>
  <path class="flow" d="M1004 285 H1018"/>

  <!-- principles -->
  <rect x="40" y="384" width="1100" height="112" rx="12" fill="#f4f7fa" stroke="#d6dee6"/>
  <text class="tlabel" x="62" y="412">WHY THIS SHAPE</text>
  <text class="sub" x="62" y="438">• Context is lost at every handoff → inject spec.md on cold start.</text>
  <text class="sub" x="62" y="460">• Judgment / taste can't be outsourced → fixed human gates (PRD · design · real-device).</text>
  <text class="sub" x="62" y="482">• Errors compound in autonomous chains → gates catch them upstream, so downstream isn't wasted.</text>
  <text class="note" x="1118" y="412" text-anchor="end">v1 · Claude Code / Codex share one spec protocol + agent prompts</text>
</svg>
