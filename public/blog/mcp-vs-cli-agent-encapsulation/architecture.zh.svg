<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560" role="img" aria-label="架构图：OpenAPI spec 自动生成归一化描述符 IR；IR 机械渲染出自动生成层（MCP 全部 1271 工具 + CLI 薄 schema 120 方法）；CLI 的 ~126 shortcut 与 Skill 层是人工策展、堆在薄层之上、不在自动生成之列；最终服务 Agent。">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; }
    .mono { font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    .t { fill: #1F1E1B; }
    .sub { fill: #8A867B; }
    .clay { fill: #C15F3C; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A867B"/>
    </marker>
    <marker id="ahc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C15F3C"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="758" height="558" rx="16" fill="#EEEBE2" stroke="#1F1E1B" stroke-opacity="0.10"/>

  <!-- spec -->
  <rect x="130" y="28" width="500" height="52" rx="12" fill="#F7F5EF" stroke="#1F1E1B" stroke-opacity="0.12"/>
  <text class="mono t" x="380" y="52" text-anchor="middle" font-size="15" font-weight="600">飞书 OpenAPI · REST</text>
  <text class="sub" x="380" y="70" text-anchor="middle" font-size="11">唯一真相源（spec）</text>

  <line x1="380" y1="80" x2="380" y2="112" stroke="#8A867B" stroke-width="1.4" marker-end="url(#ah)"/>
  <text class="sub" x="394" y="100" font-size="10.5">自动生成</text>

  <!-- IR kernel -->
  <rect x="130" y="114" width="500" height="56" rx="12" fill="#F7F2ED" stroke="#C15F3C" stroke-width="1.5"/>
  <text class="t" x="380" y="138" text-anchor="middle" font-size="15" font-weight="600">归一化描述符 IR · 共享内核</text>
  <text class="clay" x="380" y="156" text-anchor="middle" font-size="11">从 spec 自动生成 · 两个面的底座</text>

  <line x1="380" y1="170" x2="380" y2="202" stroke="#8A867B" stroke-width="1.4" marker-end="url(#ah)"/>
  <text class="sub" x="394" y="190" font-size="10.5">自动渲染 · 1:1</text>

  <!-- Band 1: auto-generated (commodity) -->
  <rect x="78" y="206" width="604" height="120" rx="12" fill="none" stroke="#1F1E1B" stroke-opacity="0.14"/>
  <text class="sub" x="96" y="226" font-size="11">① 自动生成层 · 从 IR 机械渲染 · 边际成本≈0 · commodity</text>
  <rect x="96" y="238" width="278" height="78" rx="10" fill="#F7F5EF" stroke="#1F1E1B" stroke-opacity="0.10"/>
  <text class="mono t" x="235" y="266" text-anchor="middle" font-size="15" font-weight="700">lark-mcp</text>
  <text class="sub" x="235" y="288" text-anchor="middle" font-size="11">1271 工具 / 52 域</text>
  <text class="sub" x="235" y="306" text-anchor="middle" font-size="11">默认只开 19 个</text>
  <rect x="404" y="238" width="278" height="78" rx="10" fill="#F7F5EF" stroke="#1F1E1B" stroke-opacity="0.10"/>
  <text class="mono t" x="543" y="266" text-anchor="middle" font-size="15" font-weight="700">lark-cli · 薄 schema</text>
  <text class="sub" x="543" y="288" text-anchor="middle" font-size="11">120 方法 / 9 服务</text>
  <text class="sub" x="543" y="306" text-anchor="middle" font-size="11">与 REST 1:1</text>

  <!-- CLI: hand-curated piled on top of the thin layer -->
  <line x1="543" y1="316" x2="543" y2="364" stroke="#C15F3C" stroke-width="1.4" marker-end="url(#ahc)"/>
  <text class="clay" x="557" y="344" font-size="10">人工叠在薄层之上</text>

  <!-- Band 2: hand-curated (the value) -->
  <rect x="78" y="334" width="604" height="126" rx="12" fill="#FBF3EF" stroke="#C15F3C" stroke-width="1.2"/>
  <text class="clay" x="96" y="354" font-size="11">② 人工策展层 · 人肉一条条堆 · 价值所在 · 不可规模化</text>
  <rect x="96" y="366" width="278" height="82" rx="10" fill="#F7F5EF" stroke="#1F1E1B" stroke-opacity="0.08"/>
  <text class="sub" x="235" y="402" text-anchor="middle" font-size="11.5" fill-opacity="0.7">（仅 2 个手写复合工具）</text>
  <text class="sub" x="235" y="422" text-anchor="middle" font-size="11" fill-opacity="0.7">MCP 这层几乎是空的</text>
  <rect x="404" y="366" width="278" height="82" rx="10" fill="#F7F5EF" stroke="#C15F3C" stroke-opacity="0.45"/>
  <text class="t" x="543" y="392" text-anchor="middle" font-size="14" font-weight="600">~126 个 shortcuts</text>
  <text class="sub" x="543" y="412" text-anchor="middle" font-size="11">＋ Skill 层</text>
  <text class="clay" x="543" y="432" text-anchor="middle" font-size="11">摩擦消除 / 任务封装 / 护栏</text>

  <line x1="380" y1="460" x2="380" y2="492" stroke="#8A867B" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- consumer -->
  <rect x="130" y="494" width="500" height="44" rx="12" fill="#26241F"/>
  <text class="mono" x="380" y="521" text-anchor="middle" font-size="15" fill="#EDEAE0">AI Agent / LLM</text>
</svg>
